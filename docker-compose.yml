# Images bake config/migrations at build time so bind mounts from the host are not
# required (avoids Docker Desktop "operation not permitted" on some paths).

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: experient-postgres:local
    container_name: experient-db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       experient
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d experient"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus/Dockerfile
    image: experient-prometheus:local
    container_name: experient-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    build:
      context: .
      dockerfile: docker/loki/Dockerfile
    image: experient-loki:local
    container_name: experient-loki
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
    image: experient-grafana:local
    container_name: experient-grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  loki_data:
  grafana_data:
