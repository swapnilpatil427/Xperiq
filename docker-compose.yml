# Images bake config/migrations at build time so bind mounts from the host are not
# required (avoids Docker Desktop "operation not permitted" on some paths).

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: experient-postgres:local
    container_name: experient-db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       experient
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d experient"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus/Dockerfile
    image: experient-prometheus:local
    container_name: experient-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    build:
      context: .
      dockerfile: docker/loki/Dockerfile
    image: experient-loki:local
    container_name: experient-loki
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
    image: experient-grafana:local
    container_name: experient-grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: experient-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  agents:
    # Start with: docker-compose --profile agents up -d agents
    # (prod deployments: --profile prod)
    profiles: ["agents", "prod"]
    build:
      context: .
      dockerfile: agents/Dockerfile
    image: experient-agents:local
    container_name: experient-agents
    env_file:
      - path: agents/.env
        required: false          # allows startup without an .env file
    environment:
      AGENTS_ENV: ${AGENTS_ENV:-dev}
      AGENTS_DB_DSN: postgresql://postgres:postgres@postgres:5432/experient
      AGENTS_INTERNAL_KEY: ${AGENTS_INTERNAL_KEY:-dev-internal-key-change-in-prod}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379
      ENABLE_STREAM_CONSUMER: "true"
      ENABLE_SCHEDULER: "true"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
