# Images bake config/migrations at build time so bind mounts from the host are not
# required (avoids Docker Desktop "operation not permitted" on some paths).
#
# Platform: npm scripts use scripts/docker-compose.mjs to set XPERIQ_DOCKER_PLATFORM
# for custom-built images only (linux/arm64 on Apple Silicon, linux/amd64 on Intel).
# Pre-built images (redis, cadvisor, …) are not pinned — avoids cache/platform clashes.
# Override for amd64 local builds: XPERIQ_DOCKER_PLATFORM=linux/amd64 npm run infra:reset

x-built-platform: &built-platform
  platform: ${XPERIQ_DOCKER_PLATFORM:-linux/arm64}

services:
  postgres:
    <<: *built-platform
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: xperiq-postgres:local
    container_name: xperiq-db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       xperiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xperiq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    <<: *built-platform
    build:
      context: .
      dockerfile: docker/prometheus/Dockerfile
    image: xperiq-prometheus:local
    container_name: xperiq-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  alertmanager:
    <<: *built-platform
    build:
      context: .
      dockerfile: docker/alertmanager/Dockerfile
    image: xperiq-alertmanager:local
    container_name: xperiq-alertmanager
    ports:
      - "9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    <<: *built-platform
    build:
      context: .
      dockerfile: docker/loki/Dockerfile
    image: xperiq-loki:local
    container_name: xperiq-loki
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    <<: *built-platform
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
    image: xperiq-grafana:local
    container_name: xperiq-grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # Host machine health — CPU, memory, disk, filesystem, network. Scraped internally by
  # Prometheus (node-exporter:9100); no host port needed. (On Fly.io, host metrics come from
  # Fly's built-in Prometheus instead.)
  #
  # Mount propagation rslave is recommended on native Linux hosts but fails on Docker Desktop
  # (macOS/Windows): "path / is mounted on / but it is not a shared or slave mount".
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: xperiq-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro"
    restart: unless-stopped

  # Per-container resource usage (cpu/mem/io per service). Scraped internally (cadvisor:8080).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: xperiq-cadvisor
    privileged: true
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xperiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  agents:
    # Start with: docker-compose --profile agents up -d agents
    # (prod deployments: --profile prod)
    <<: *built-platform
    profiles: ["agents", "prod"]
    build:
      context: .
      dockerfile: crystalos/Dockerfile
    image: xperiq-agents:local
    container_name: xperiq-agents
    env_file:
      - path: crystalos/.env
        required: false          # allows startup without an .env file
    environment:
      AGENTS_ENV: ${AGENTS_ENV:-dev}
      LOG_PRETTY: ${LOG_PRETTY:-0}
      AGENTS_DB_DSN: postgresql://postgres:postgres@postgres:5432/xperiq
      AGENTS_INTERNAL_KEY: ${AGENTS_INTERNAL_KEY:-dev-internal-key-change-in-prod}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379
      ENABLE_STREAM_CONSUMER: "true"
      ENABLE_SCHEDULER: "true"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  event-engine:
    # Notification/alert/workflow stream processor (reuses the backend codebase).
    # Start with: docker-compose --profile event-engine up -d event-engine
    # Locally you can instead run `npm --prefix backend run start:event-engine`,
    # or set ENABLE_EVENT_ENGINE=true to run it in-process with the backend.
    <<: *built-platform
    profiles: ["event-engine", "prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xperiq-backend:local
    container_name: xperiq-event-engine
    command: ["node", "src/eventEngine/index.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/xperiq
      REDIS_URL: redis://redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    # Dedicated scheduler service — owns cross-cutting / DB periodic jobs (expire_stale_broadcasts,
    # future reconciliation / cost-down dividend) and is the scheduler observability hub.
    # Separately scalable; reuses the backend image + library code (no separate node_modules).
    #   docker-compose --profile scheduler up -d scheduler
    #   or locally: npm --prefix backend run start:scheduler
    <<: *built-platform
    profiles: ["scheduler", "prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xperiq-backend:local
    container_name: xperiq-scheduler
    command: ["node", "src/scheduler/index.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/xperiq
      REDIS_URL: redis://redis:6379
      SCHEDULER_PORT: "8090"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
