# Alertmanager — routing, grouping, dedup, and delivery for the Prometheus alerts in
# docker/prometheus/rules/*.yml. The default receiver has NO integration wired (so it never
# errors); add Slack/PagerDuty/email below to actually notify. The wiring (Prometheus →
# Alertmanager → receiver) is complete — only the destination is left to fill in.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity = "critical"']
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    # Wire a destination, e.g. Slack:
    # slack_configs:
    #   - api_url: '<SLACK_WEBHOOK_URL>'
    #     channel: '#experient-alerts'
    #     send_resolved: true

  - name: critical
    # Page on-call for critical alerts, e.g. PagerDuty:
    # pagerduty_configs:
    #   - routing_key: '<PAGERDUTY_ROUTING_KEY>'
    #     send_resolved: true

inhibit_rules:
  # A critical alert suppresses a warning with the same name (avoid double-paging).
  - source_matchers: ['severity = "critical"']
    target_matchers: ['severity = "warning"']
    equal: ['alertname']
