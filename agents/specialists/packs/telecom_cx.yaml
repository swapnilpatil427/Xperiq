id: telecom_cx
display_name: "Telecommunications Customer Experience"
priority: 75
match:
  industries: [telecom, telecommunications, isp, mobile, cable, broadband, wireless]
  use_cases: [CX, customer_experience, service_quality]
  survey_types: [service_nps, support_csat, installation_ces, billing_survey]
  audiences: [customers, subscribers, account_holders]
taxonomy:
  canonical_topics:
    - { name: "Network Reliability",     parent: "Service Quality",    keywords: [outage, down, unreliable, coverage, signal, dropped, intermittent, uptime], weight: 1.4 }
    - { name: "Connection Speed",        parent: "Service Quality",    keywords: [slow, fast, speed, bandwidth, latency, throttle, streaming, buffering], weight: 1.3 }
    - { name: "Billing & Charges",       parent: "Administrative",     keywords: [bill, charge, unexpected, hidden, fee, overage, plan, incorrect, dispute], weight: 1.2 }
    - { name: "Customer Support",        parent: "Support",            keywords: [support, hold, agent, call center, chat, escalate, wait, resolved, helpful] }
    - { name: "Installation & Setup",    parent: "Onboarding",         keywords: [installation, setup, technician, appointment, on-time, equipment, router] }
    - { name: "Contract & Pricing",      parent: "Value",              keywords: [contract, locked, price, increase, competitive, cancel, leave] }
    - { name: "Mobile App & Online",     parent: "Digital",            keywords: [app, portal, online, account, self-service, manage, bill pay] }
benchmarks:
  nps:  { p25: -15, p50: -5, p75: 10, source: "Bain Telecom NPS 2024" }
  csat: { p25: 3.2, p50: 3.6, p75: 4.0, scale: 5 }
  ces:  { p25: 5.5, p50: 4.5, p75: 3.5, scale: 7 }
vocabulary:
  positive_signals: [reliable, fast, helpful, resolved quickly, easy, no issues, consistent]
  negative_signals: [outage, slow, overcharged, rude, long hold, unreliable, throttled, contract trap]
  red_flags: [churn, cancel, switching, class action, regulatory complaint, FCC complaint]
  domain_terms: [NPS, churn, ARPU, subscriber, LTV, tier, contract, SLA, uptime]
prompt_overlays:
  narrate_system: |
    You are an expert telecom CX analyst. You understand network reliability, billing disputes, and high-churn dynamics.
    Note: Telecom has the lowest NPS of any industry. Median is -5; good performers reach +10.
    Reliability and billing issues are the #1 and #2 churn drivers in telecom.
  topics_system: |
    Organize telecom feedback by: Service Quality → Billing → Support → Onboarding → Digital.
    Flag outage and billing dispute clusters as CRITICAL — these are top churn triggers.
  crystal_system: |
    You are Crystal, a telecom CX expert. Telecom has very low NPS industry-wide; contextualize accordingly.
question_templates:
  - { id: tel.recommend,   text: "How likely are you to recommend our service to a friend or family member?",      type: nps, theme: "Overall" }
  - { id: tel.reliability, text: "How satisfied are you with the reliability of your service?",                    type: csat, theme: "Reliability" }
  - { id: tel.support,     text: "How easy was it to resolve your issue when you contacted us?",                   type: ces, theme: "Support" }
  - { id: tel.open,        text: "What's the main reason for the score you gave?",                                 type: open_text, theme: "Open Feedback" }
