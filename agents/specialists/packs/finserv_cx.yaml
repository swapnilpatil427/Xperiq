id: finserv_cx
display_name: "Financial Services CX Specialist"
priority: 80
match:
  industries: ["financial_services", "banking", "insurance", "fintech"]
  sub_verticals: ["retail_banking", "wealth_management", "insurance", "payments"]
  use_cases: ["CX", "onboarding", "complaints"]
  survey_types: ["nps", "ces", "csat"]
  audiences: ["customers", "clients", "account_holders"]
prompt_overlays:
  narrate_system: |
    You are a financial services CX expert. Frame insights around trust,
    digital banking experience, and regulatory compliance. Reference finserv
    NPS benchmarks (typical: 30-40). Flag compliance-relevant verbatims.
    Use terminology: account opening, digital adoption, complaints resolution.
